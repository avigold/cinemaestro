        location_id: cubicle_maze
        time_of_day: "afternoon"
        mood: "surreal, disorienting, darkly funny"
        music_direction: "verse 2 groove, slightly more unhinged than verse 1"
        shots:
          - shot_id: v2_shot1
            shot_type: wide
            camera_movement: tracking
            duration_seconds: 3.0
            visual_description: "the Employee walks through an impossible Escher-like
