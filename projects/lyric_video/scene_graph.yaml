title: "Synergy! — The Music Video"
logline: "A satirical corporate-punk music video that visualizes buzzword culture as an
  absurdist dystopia — slick boardrooms devolve into chaos, motivational posters bleed,
  and a lone worker breaks free."
genre: "comedy, satire"
tone: "deadpan corporate to unhinged punk, escalating absurdity"
style: "photorealistic cinematic with surrealist elements, handheld energy during
  choruses, locked-off symmetry during verses, Wes Anderson meets Fight Club"
target_duration_seconds: 235.0
aspect_ratio: "16:9"
color_grade: "sterile fluorescent cool tones for office scenes, increasingly saturated
  and distorted as the song escalates, full blown neon chaos by final chorus"
music_theme: "pre-recorded track — corporate buzzword anthem, punk-rock energy with
  satirical lyrics"

characters:
  - character_id: protagonist
    name: The Employee
    physical_description: "mid-30s, any ethnicity, tired but sharp eyes, the kind of
      face that's been in too many meetings"
    wardrobe: "crisp white button-down shirt (progressively loosened/disheveled through
      the video), grey slacks, lanyard with badge"
    distinguishing_features: "coffee-stained shirt cuff, thousand-yard meeting stare
      that gradually transforms into manic energy"

  - character_id: boss
    name: The Synergy Evangelist
    physical_description: "50s, immaculate grooming, unnervingly white teeth, power
      stance at all times"
    wardrobe: "navy suit, motivational speaker headset mic, TED-talk casual blazer
      over company t-shirt"
    distinguishing_features: "never stops gesturing, always pointing at invisible
      charts, finger-guns between every sentence"

  - character_id: choir
    name: The Corporate Choir
    physical_description: "group of 6-8 office workers, diverse, all wearing matching
      company polos, dead-eyed but smiling"
    wardrobe: "matching company-branded polo shirts, khakis, lanyards"
    distinguishing_features: "synchronized head nodding, identical forced smiles,
      move in perfect unison like a cult"

locations:
  - location_id: boardroom
    name: The Boardroom
    description: "sterile modern corporate boardroom, long glass table, ergonomic
      chairs, massive TV showing a pie chart, motivational poster on the wall
      reading 'SYNERGY IS A TEAM SPORT', fluorescent overhead lighting"
    style_notes: "cold fluorescent, symmetrical framing, oppressively clean"

  - location_id: open_office
    name: The Open-Plan Office
    description: "vast open-plan office with rows of identical standing desks,
      monitors showing Slack notifications, sticky notes everywhere, a sad
      succulent on every desk, overhead fluorescent tubes"
    style_notes: "wide shots emphasizing the grid pattern, dehumanizing scale"

  - location_id: breakroom
    name: The Break Room
    description: "depressing corporate break room, humming vending machine,
      microwave with suspicious stains, motivational poster reading
      'THERE IS NO I IN TEAM BUT THERE IS IN WIN', single sad chair"
    style_notes: "sickly fluorescent, slightly underexposed, loneliness"

  - location_id: elevator
    name: The Elevator
    description: "cramped corporate elevator, brushed steel walls, floor indicator
      lights, awkward proximity"
    style_notes: "claustrophobic, tight framing, unflattering overhead light"

  - location_id: stage
    name: The All-Hands Stage
    description: "corporate all-hands meeting stage with massive LED screen behind
      it showing 'Q3 SYNERGY INITIATIVE', podium with company logo, fog machine,
      laser lights that look borrowed from a nightclub"
    style_notes: "over-the-top corporate event lighting, fog, lasers, absurd grandeur"

  - location_id: parking_lot
    name: The Parking Lot
    description: "empty corporate parking lot at golden hour, a single car remaining,
      the corporate building looming behind, freedom ahead"
    style_notes: "warm golden hour vs cold building, liberation"

  - location_id: cubicle_maze
    name: The Cubicle Labyrinth
    description: "impossible M.C. Escher-like maze of cubicle walls, stretching in
      all directions, papers floating, phones ringing endlessly"
    style_notes: "surrealist, disorienting angles, infinite repetition"

  - location_id: rooftop
    name: The Corporate Rooftop
    description: "rooftop of the corporate building at sunset, city skyline behind,
      wind blowing, protagonist alone at the edge looking out"
    style_notes: "epic wide shot, golden light, freedom and possibility"

acts:
  - act_number: 1
    title: "The Grind"
    scenes:
      # ── INTRO (4.0-12.6s) ──
      - scene_id: intro
        scene_number: 1
        title: "Temperature Check"
        description: "Establishing the corporate prison. The Employee arrives at
          another soul-crushing day. Everything is sterile, symmetrical, oppressive."
        location_id: open_office
        time_of_day: "morning"
        mood: "deadpan, suffocating normalcy"
        music_direction: "spoken-word intro over minimal beat, building tension"
        shots:
          - shot_id: intro_shot1
            shot_type: extreme_wide
            camera_movement: dolly_in
            duration_seconds: 3.0
            visual_description: "symmetrical God's-eye-view of the open-plan office,
              rows of identical desks stretching to vanishing point, one figure
              (the Employee) walking through the center aisle, coffee in hand,
              fluorescent lights humming overhead"
            characters_present: [protagonist]
            dialogue: []
            sound_effects:
              - description: "fluorescent light buzz, distant keyboard clacking"
                intensity: 0.3
            mood: "institutional dread"
            lighting: "cold overhead fluorescent, no shadows"
            location_id: open_office
            time_of_day: "morning"
            transition_in: fade_in
            transition_out: cut

          - shot_id: intro_shot2
            shot_type: medium_close
            camera_movement: static
            duration_seconds: 2.5
            visual_description: "the Employee sits at their desk, puts on headphones,
              stares at a screen full of meeting invites, takes a slow sip of coffee,
              eyes dead, lip-syncing 'Quick temperature check' with zero emotion"
            characters_present: [protagonist]
            dialogue: []
            sound_effects:
              - description: "Outlook calendar notification chime"
                intensity: 0.2
            mood: "resigned acceptance"
            lighting: "monitor glow on face, fluorescent overhead"
            location_id: open_office
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: intro_shot3
            shot_type: medium
            camera_movement: pan
            duration_seconds: 3.5
            visual_description: "slow pan across a row of motivational posters on
              the wall — 'DISRUPT THE STATUS QUO', 'BE A ROCKSTAR', 'PIVOT OR DIE'
              — each more absurd than the last, camera landing on the Employee
              mouthing 'Alright team, get the ball rolling' as they walk toward
              the boardroom"
            characters_present: [protagonist]
            dialogue: []
            sound_effects: []
            mood: "mounting absurdity"
            lighting: "fluorescent, poster colors slightly oversaturated"
            location_id: open_office
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

      # ── VERSE 1 (24.8-49.0s) ──
      - scene_id: verse1
        scene_number: 2
        title: "The Meeting"
        description: "The boardroom meeting from hell. Every corporate cliché
          made visual. The Boss delivers buzzwords like a preacher."
        location_id: boardroom
        time_of_day: "morning"
        mood: "escalating absurdity, deadpan comedy"
        music_direction: "verse groove kicks in, driving beat, punk energy building"
        shots:
          - shot_id: v1_shot1
            shot_type: wide
            camera_movement: dolly_in
            duration_seconds: 3.0
            visual_description: "the Boss stands at the head of the boardroom table,
              pointing at a pie chart that just says 'SYNERGY' in every slice,
              gesturing wildly, the Corporate Choir seated around the table
              nodding in perfect synchronization"
            characters_present: [boss, choir]
            dialogue: []
            sound_effects:
              - description: "laser pointer clicking"
                intensity: 0.2
            mood: "corporate theater"
            lighting: "harsh boardroom fluorescent, TV glow"
            location_id: boardroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: v1_shot2
            shot_type: close_up
            camera_movement: static
            duration_seconds: 2.0
            visual_description: "extreme close-up of the Boss's mouth lip-syncing
              'Touch base, ping me, close the loop' — teeth unnervingly white,
              motivational headset mic visible"
            characters_present: [boss]
            dialogue: []
            sound_effects: []
            mood: "uncomfortable intimacy"
            lighting: "flat corporate lighting"
            location_id: boardroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: v1_shot3
            shot_type: medium
            camera_movement: tracking
            duration_seconds: 3.0
            visual_description: "tracking shot along the boardroom table — each
              Corporate Choir member lip-syncing a different buzzword simultaneously,
              heads turning to camera one by one like a horror movie, forced smiles
              never wavering"
            characters_present: [choir]
            dialogue: []
            sound_effects:
              - description: "pen clicking in rhythm with the beat"
                intensity: 0.15
            mood: "comedic unease"
            lighting: "fluorescent overhead, each face identically lit"
            location_id: boardroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: v1_shot4
            shot_type: medium_close
            camera_movement: static
            duration_seconds: 2.5
            visual_description: "the Employee at the far end of the table, coffee
              going cold, eyes glazing over, a single sticky note in front of them
              reading 'WHY AM I HERE', lip-syncing 'Blue sky thinking, yes we can'
              with maximum sarcasm"
            characters_present: [protagonist]
            dialogue: []
            sound_effects: []
            mood: "quiet rebellion brewing"
            lighting: "slightly darker end of the table, alienated"
            location_id: boardroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: v1_shot5
            shot_type: wide
            camera_movement: crane_up
            duration_seconds: 3.0
            visual_description: "the Boss now standing ON the boardroom table,
              power-posing like a motivational speaker, pointing finger-guns at
              each person, the TV behind showing a stock photo of a handshake
              with 'SYNERGY RISING' overlaid, the Choir applauding in unison"
            characters_present: [boss, choir, protagonist]
            dialogue: []
            sound_effects:
              - description: "synchronized clapping"
                intensity: 0.3
            mood: "peak absurdity"
            lighting: "dramatic uplighting from the TV screen"
            location_id: boardroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: v1_shot6
            shot_type: close_up
            camera_movement: dolly_in
            duration_seconds: 2.5
            visual_description: "close-up of the Employee's face, a tic of
              suppressed laughter or scream, lip-syncing 'Thought-leader ninja
              in the room tonight' — the words visibly paining them, fluorescent
              light reflecting in their dead eyes"
            characters_present: [protagonist]
            dialogue: []
            sound_effects: []
            mood: "existential breaking point"
            lighting: "unflattering overhead fluorescent"
            location_id: boardroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: v1_shot7
            shot_type: extreme_wide
            camera_movement: static
            duration_seconds: 3.0
            visual_description: "wide shot of the entire boardroom from above,
              everyone frozen in a tableau — the Boss mid-gesture, the Choir
              mid-nod, the Employee the only one who looks up at the camera
              with a 'help me' expression, the motivational poster behind them
              reading 'IDEATION UNDER FLUORESCENT LIGHT'"
            characters_present: [boss, choir, protagonist]
            dialogue: []
            sound_effects:
              - description: "fluorescent tube flickering"
                intensity: 0.2
            mood: "trapped"
            lighting: "harsh overhead, one tube flickering"
            location_id: boardroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

      # ── PRE-CHORUS 1 (49.0-61.2s) ──
      - scene_id: prechorus1
        scene_number: 3
        title: "Bandwidth Low"
        description: "The Employee escapes the meeting into the break room and
          elevator. Corporate phrases become increasingly oppressive."
        location_id: breakroom
        time_of_day: "morning"
        mood: "claustrophobic, tension building"
        music_direction: "building tension, drums intensifying, approaching chorus"
        shots:
          - shot_id: pc1_shot1
            shot_type: medium
            camera_movement: handheld
            duration_seconds: 3.0
            visual_description: "the Employee in the break room, alone, staring into
              the microwave as something sad rotates inside, lip-syncing 'Bandwidth
              low but we'll action that' to their own reflection in the microwave
              door, motivational poster behind reading 'TAKE THIS OFFLINE'"
            characters_present: [protagonist]
            dialogue: []
            sound_effects:
              - description: "microwave humming"
                intensity: 0.2
            mood: "solitary desperation"
            lighting: "sickly fluorescent, microwave glow"
            location_id: breakroom
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: pc1_shot2
            shot_type: medium
            camera_movement: static
            duration_seconds: 3.0
            visual_description: "the Employee in the elevator, doors closing, they
              catch their reflection in the brushed steel — mouth the words
              'Take this offline, put a pin in it soon' — the floor indicator
              lights count down like a countdown clock, their expression hardening"
            characters_present: [protagonist]
            dialogue: []
            sound_effects:
              - description: "elevator ding, doors closing"
                intensity: 0.3
            mood: "mounting pressure"
            lighting: "harsh overhead elevator light"
            location_id: elevator
            time_of_day: "morning"
            transition_in: cut
            transition_out: cut

          - shot_id: pc1_shot3
            shot_type: close_up
            camera_movement: dolly_in
            duration_seconds: 3.0
            visual_description: "extreme close-up of the Employee's eyes, we see
              the fluorescent lights reflected, a micro-expression of rage or
              revelation, lip-syncing 'Hard stop coming this afternoon' — the
              words finally feel like a threat, not a schedule note"
            characters_present: [protagonist]
            dialogue: []
            sound_effects:
              - description: "heartbeat-like bass thump synced to music"
                intensity: 0.5
            mood: "the fuse is lit"
            lighting: "tight spotlight, rest in shadow"
            location_id: elevator
            time_of_day: "morning"
            transition_in: cut
            transition_out: smash_cut

  - act_number: 2
    title: "The Eruption"
    scenes:
      # ── CHORUS 1 (61.2-85.5s) ──
      - scene_id: chorus1
        scene_number: 4
        title: "SYNERGY!"
        description: "The chorus explodes. The all-hands stage becomes a manic
          corporate rally. The Boss is a preacher, the Choir is a congregation,
          and the Employee is losing their mind."
        location_id: stage
        time_of_day: "day"
        mood: "unhinged corporate euphoria"
        music_direction: "full chorus explosion, maximum energy, crowd chant"
        shots:
          - shot_id: ch1_shot1
            shot_type: wide
            camera_movement: crane_up
            duration_seconds: 3.0
            visual_description: "the all-hands stage erupts — fog machines blasting,
              laser lights cutting through the fog, the Boss at the podium arms
              raised like a rock star, the LED screen behind flashing 'SYNERGY!'
              in massive letters, the Corporate Choir in the front row pumping
              fists in unison"
            characters_present: [boss, choir]
            dialogue: []
            sound_effects:
              - description: "crowd roar, fog machine hiss"
                intensity: 0.6
            mood: "corporate Nuremberg rally"
            lighting: "concert lighting, lasers, fog, strobes"
