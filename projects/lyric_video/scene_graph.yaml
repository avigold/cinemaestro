              a motivational poster falling off a wall"
            characters_present: [boss, protagonist]
            dialogue: []
            sound_effects:
              - description: "glass breaking, desk slam"
                intensity: 0.5
            mood: "sensory overload"
            lighting: "strobing, unstable"
            location_id: stage
            time_of_day: "day"
            transition_in: cut
            transition_out: cut

          - shot_id: ch1_shot4
            shot_type: wide
            camera_movement: tracking
            duration_seconds: 3.0
            visual_description: "the Corporate Choir now on stage in a V-formation
              behind the Boss, doing synchronized choreography — corporate
              finger-pointing, handshake miming, power poses — lip-syncing
              'ROCKSTAR! NINJA! CROSS-FUNCTIONAL TEAM!' with terrifying
              enthusiasm, fog swirling at their feet"
            characters_present: [boss, choir]
            dialogue: []
            sound_effects:
              - description: "synchronized stomping"
                intensity: 0.4
            mood: "choreographed madness"
            lighting: "uplighting through fog, dramatic silhouettes"
            location_id: stage
            time_of_day: "day"
            transition_in: cut
            transition_out: cut

          - shot_id: ch1_shot5
            shot_type: medium_close
            camera_movement: dolly_in
            duration_seconds: 2.5
            visual_description: "the Employee at the back of the audience, the only
              still figure in a sea of pumping fists, lip-syncing 'HOLISTIC
              CORPORATE DREAM' — but their face cracks into an involuntary
              genuine laugh, the absurdity finally hitting them"
            characters_present: [protagonist]
            dialogue: []
            sound_effects: []
            mood: "breakthrough moment — the laugh"
            lighting: "backlit by stage lights, face half in shadow"
            location_id: stage
            time_of_day: "day"
            transition_in: cut
            transition_out: cut

      # ── VERSE 2 (85.5-109.8s) ──
      - scene_id: verse2
